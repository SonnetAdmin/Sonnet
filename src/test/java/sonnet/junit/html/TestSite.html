<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css" rel="stylesheet">
    <title>Test Site</title>
</head>
<body>
<h1>Test Site</h1>
<form>
    <label for="text_input">Text Input:</label>
    <input class="text_input" id="text_input" name="text_input" placeholder="type here...">
    <br>

    <label for="text_area">Text Area:</label>
    <textarea class="text_area" id="text_area" name="text_area" placeholder="type here..."></textarea>
    <br>

    <label>Radio Buttons:</label>
    <div>
        <input id="radio1" name="radio" type="radio" value="radio1">
        <label for="radio1">Option 1</label>
    </div>
    <div>
        <input id="radio2" name="radio" type="radio" value="radio2">
        <label for="radio2">Option 2</label>
    </div>
    <div>
        <input id="radio3" name="radio" type="radio" value="radio3">
        <label for="radio3">Option 3</label>
    </div>
    <br>

    <label for="checkbox">Checkbox:</label>
    <input id="checkbox" name="checkbox" type="checkbox">
    <br>

    <label for="button">Button:</label>
    <button id="button" name="button" type="button"></button>
    <br>


</form>
</body>
</html>
